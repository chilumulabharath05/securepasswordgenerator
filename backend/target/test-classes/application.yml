spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  encryption:
    key: ""
  breach-check:
    enabled: false

logging:
  level:
    root: WARN
    com.securepwgen: INFO
