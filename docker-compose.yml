version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pwgen-backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-}
      - APP_BREACH_CHECK_ENABLED=true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pwgen-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
